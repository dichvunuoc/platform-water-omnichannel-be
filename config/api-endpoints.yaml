# API Endpoint Configuration
# Per-service mock/live switching, timeouts, cache tiers, and circuit breaker settings.
# Hot-reloaded via chokidar when MOCK_MODE is not active.

services:
  # =============================================================================
  # MVP Services (Epic 1-3) — Detailed Configuration
  # =============================================================================

  # --- Auth & Identity (Epic 1) ---
  auth:
    adapter: mock
    baseUrl: ${BACKEND_BASE_URL}/auth
    timeout: 3000
    cacheTier: static
    cacheTtl: 43200
    circuitBreaker:
      errorThreshold: 50
      resetTimeout: 10000
      minRequests: 5
    description: "Authentication & token management"
    methods: ["login", "register", "refresh", "logout", "verify"]

  customer-profile:
    adapter: mock
    baseUrl: ${BACKEND_BASE_URL}/customers
